<!DOCTYPE html>
<html>
<head>
  <title>Advanced IPTV System</title>

  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #0f172a;
      color: white;
    }

    h2 {
      color: #38bdf8;
    }

    .search-box {
      width: 500px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    #results {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .thumb {
      height: 140px;
      background-size: cover;
      background-position: center;
    }

    .content {
      padding: 12px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
    }

    .desc {
      font-size: 12px;
      color: #cbd5e1;
      margin-top: 5px;
    }

    .tags {
      margin-top: 8px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 5px;
      background: #334155;
    }

    .play {
      margin-top: 10px;
      display: inline-block;
      padding: 6px 10px;
      background: #22c55e;
      border-radius: 6px;
      font-size: 12px;
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h2>🔥 Advanced IPTV Search System</h2>

<div class="search-box">
  <input type="text" id="search" placeholder="Search IPTV channels...">
</div>

<div id="results"></div>

<script>
let data = [];

// LOAD DATA FROM EXTERNAL FILE (listing.json)
fetch("listing.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    render(data);
  });

const search = document.getElementById("search");
const results = document.getElementById("results");

search.addEventListener("input", function () {
  let value = this.value.toLowerCase();

  let filtered = data.filter(item =>
    item.name.toLowerCase().includes(value) ||
    item.category.toLowerCase().includes(value) ||
    item.desc.toLowerCase().includes(value)
  );

  render(filtered);
});

function render(list) {
  results.innerHTML = "";

  list.forEach(item => {
    let div = document.createElement("div");
    div.classList.add("card");

    div.innerHTML = `
      <div class="thumb" style="background-image:url('${item.image}')"></div>
      <div class="content">
        <div class="title">${item.name}</div>
        <div class="desc">${item.desc}</div>

        <div class="tags">
          <div class="tag">${item.category}</div>
          <div class="tag">${item.status}</div>
        </div>

        <a class="play" href="${item.link}" target="_blank">▶ Play</a>
      </div>
    `;

    results.appendChild(div);
  });
}
</script>

</body>
</html>
