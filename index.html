<!DOCTYPE html>
<html>
<head>
  <title>Advanced IPTV Single File System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      color: #38bdf8;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
      margin-bottom: 20px;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .thumb {
      height: 140px;
      background-size: cover;
      background-position: center;
    }

    .content {
      padding: 12px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
    }

    .desc {
      font-size: 12px;
      color: #cbd5e1;
      margin-top: 5px;
    }

    .tags {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 5px;
      background: #334155;
    }

    .play {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>🔥 Advanced IPTV Search System</header>

<div class="container">
  <input type="text" id="search" placeholder="Search IPTV channels...">
  <div id="results"></div>
</div>

<script>
const data = [
  {
    name: "Sports IPTV HD",
    category: "Sports",
    desc: "Live football, cricket, UFC and all sports channels.",
    status: "LIVE",
    image: "https://picsum.photos/300/200?1",
    link: "https://top-iptv-providers.github.io/sport-hd-iptv.html"
  },
  {
    name: "Movies IPTV Ultra",
    category: "Movies",
    desc: "Hollywood & Bollywood latest HD movies.",
    status: "HD",
    image: "https://picsum.photos/300/200?2",
    link: "#"
  },
  {
    name: "Kids IPTV Pack",
    category: "Kids",
    desc: "Cartoons and kids learning channels.",
    status: "ACTIVE",
    image: "https://picsum.photos/300/200?3",
    link: "#"
  },
  {
    name: "News IPTV Global",
    category: "News",
    desc: "24/7 world news live coverage.",
    status: "LIVE",
    image: "https://picsum.photos/300/200?4",
    link: "#"
  },
  {
    name: "World IPTV Premium",
    category: "Global",
    desc: "International channels USA, UK, India, Pakistan.",
    status: "PREMIUM",
    image: "https://picsum.photos/300/200?5",
    link: "#"
  }
];

const search = document.getElementById("search");
const results = document.getElementById("results");

// initial load
render(data);

search.addEventListener("input", function () {
  let value = this.value.toLowerCase();

  let filtered = data.filter(item =>
    item.name.toLowerCase().includes(value) ||
    item.category.toLowerCase().includes(value) ||
    item.desc.toLowerCase().includes(value)
  );

  render(filtered);
});

function render(list) {
  results.innerHTML = "";

  list.forEach(item => {
    let div = document.createElement("div");
    div.classList.add("card");

    div.innerHTML = `
      <div class="thumb" style="background-image:url('${item.image}')"></div>
      <div class="content">
        <div class="title">${item.name}</div>
        <div class="desc">${item.desc}</div>

        <div class="tags">
          <div class="tag">${item.category}</div>
          <div class="tag">${item.status}</div>
        </div>

        <a class="play" href="${item.link}" target="_blank">▶ Play</a>
      </div>
    `;

    results.appendChild(div);
  });
}
</script>

</body>
</html>
