<!DOCTYPE html>
<html>
<head>
  <title>Search IPTV</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }
    #results {
      margin-top: 10px;
      border: 1px solid #ccc;
      width: 300px;
      display: none;
    }
    .item {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .item:hover {
      background: #f2f2f2;
    }
  </style>
</head>
<body>

<h2>Search IPTV</h2>

<input type="text" id="search" placeholder="Search IPTV...">
<div id="results"></div>

<script>
let data = [];

// OPTION 1: Static data
data = [
  "Sports IPTV",
  "Movies IPTV",
  "Kids IPTV",
  "News IPTV",
  "HD IPTV",
  "India IPTV",
  "Pakistan IPTV",
  "Sports HD Live",
  "World IPTV Channels"
];

// search function
const searchInput = document.getElementById("search");
const resultsBox = document.getElementById("results");

searchInput.addEventListener("input", function () {
  let value = this.value.toLowerCase();
  resultsBox.innerHTML = "";

  if (value === "") {
    resultsBox.style.display = "none";
    return;
  }

  let filtered = data.filter(item =>
    item.toLowerCase().includes(value)
  );

  if (filtered.length === 0) {
    resultsBox.innerHTML = "<div class='item'>No result found</div>";
  } else {
    filtered.forEach(item => {
      let div = document.createElement("div");
      div.className = "item";
      div.innerText = item;

      div.onclick = () => {
        searchInput.value = item;
        resultsBox.style.display = "none";
      };

      resultsBox.appendChild(div);
    });
  }

  resultsBox.style.display = "block";
});
</script>

</body>
</html>
